<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Thursday Athena</title>

<style>
body{
    margin:0;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(to top,#3b6e22 0%,#87ceeb 100%);
    display:flex;
    justify-content:center;
    align-items:flex-end;
    font-family:Arial, sans-serif;
}

.scene{
    position:relative;
    width:100%;
    height:100%;
}

/* Sun */
.sun{
    position:absolute;
    width:120px;
    height:120px;
    background:gold;
    border-radius:50%;
    box-shadow:0 0 50px gold;
    left:50%;
    transform:translateX(-50%);
    bottom:-150px;
    animation:sunrise 6s ease-out forwards;
}

@keyframes sunrise{
    from{
        bottom:-150px;
    }
    to{
        bottom:65%;
    }
}

/* Flower Stem */
.stem{
    position:absolute;
    bottom:0;
    left:50%;
    width:10px;
    height:250px;
    background:green;
    transform:translateX(-50%);
}

/* Flower Center */
.center{
    position:absolute;
    width:50px;
    height:50px;
    background:#8B4513;
    border-radius:50%;
    left:50%;
    bottom:225px;
    transform:translateX(-50%) scale(0);
    animation:centerGrow 2s ease forwards;
    animation-delay:4s;
}

@keyframes centerGrow{
    to{
        transform:translateX(-50%) scale(1);
    }
}

/* Petals */
.petal{
    position:absolute;
    width:50px;
    height:80px;
    background:#ff69b4;
    border-radius:50%;
    left:50%;
    bottom:225px;
    transform-origin:center bottom;
    opacity:0;
    animation:bloom 2s ease forwards;
    animation-delay:4s;
}

.p1{ transform:translateX(-50%) rotate(0deg) scale(0);}
.p2{ transform:translateX(-50%) rotate(45deg) scale(0);}
.p3{ transform:translateX(-50%) rotate(90deg) scale(0);}
.p4{ transform:translateX(-50%) rotate(135deg) scale(0);}
.p5{ transform:translateX(-50%) rotate(180deg) scale(0);}
.p6{ transform:translateX(-50%) rotate(225deg) scale(0);}
.p7{ transform:translateX(-50%) rotate(270deg) scale(0);}
.p8{ transform:translateX(-50%) rotate(315deg) scale(0);}

@keyframes bloom{
    to{
        opacity:1;
        transform:translateX(-50%) rotate(var(--rot)) translateY(-35px) scale(1);
    }
}

.p1{--rot:0deg;}
.p2{--rot:45deg;}
.p3{--rot:90deg;}
.p4{--rot:135deg;}
.p5{--rot:180deg;}
.p6{--rot:225deg;}
.p7{--rot:270deg;}
.p8{--rot:315deg;}

/* Message */
.message{
    position:absolute;
    top:15%;
    width:100%;
    text-align:center;
    font-size:4rem;
    font-weight:bold;
    color:white;
    text-shadow:0 0 20px hotpink,
                 0 0 40px hotpink,
                 0 0 60px hotpink;
    opacity:0;
}

.flash{
    animation:flash 1s infinite;
}

@keyframes flash{
    0%,100%{opacity:1;}
    50%{opacity:0;}
}
</style>
</head>

<body>

<div class="scene">

    <div class="sun"></div>

    <div class="stem"></div>

    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>
    <div class="petal p5"></div>
    <div class="petal p6"></div>
    <div class="petal p7"></div>
    <div class="petal p8"></div>

    <div class="center"></div>

    <div class="message" id="message">
        Happy Thursday Athena 🌸
    </div>

</div>

<script>
setTimeout(() => {
    const msg = document.getElementById("message");
    msg.style.opacity = "1";
    msg.classList.add("flash");
}, 6500);
</script>

</body>
</html>
